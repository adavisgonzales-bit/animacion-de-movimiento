<html>
    <head>
        <title>ANIMACIONES 3 CSS</title>
        <style>
            *{
                padding: 0px;
                margin: 0px;
            }
            .contenedor{
                width: 400px;
                height: 200px;
                border: 1px solid black;
                position: relative;/* para cerrar el div */
                margin: 0 auto;/* para cerrar el div tambien */

                overflow: hidden; /* muestra solo lo interior */
            }

            .cuadrito{
                width: 100px;
                height: 100px;
                background-color: red;
                position: absolute; /* permite mover el div dentro del contenedor */
                
                left: -100px;
                top: 500x;

                animation: cuadrito 3s infinite linear;
            }

            @keyframes cuadrito{
                from
                {
top: 250px;
left: -300px;
                }

                to
                {
left: 550px;
top: -100;
                }
            }
        </style>

    </head>
<body>
    <div class="contenedor">
        <div class="cuadrito"></div>
    </div>
</body>
</html>
